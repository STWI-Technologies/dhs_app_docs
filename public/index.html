<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2E3192" />

    <!-- SEO Meta Tags -->
    <title>Direct Home Service - Knowledge Base</title>
    <meta name="description" content="Official knowledge base for Direct Home Service. Guides, tutorials, and documentation for managing users, crews, clients, appointments, estimates, jobs, invoices, timesheets, and AI-powered features." />
    <meta name="keywords" content="Direct Home Service, knowledge base, help center, documentation, field service management, appointments, estimates, jobs, invoices, crews, clients, AI assistant, WhatsApp" />
    <meta name="author" content="Direct Home Service" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://docs.directhomeservice.com/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Direct Home Service - Knowledge Base" />
    <meta property="og:description" content="Official knowledge base for Direct Home Service. Find guides, tutorials, and documentation for the DHS platform." />
    <meta property="og:url" content="https://docs.directhomeservice.com/" />
    <meta property="og:site_name" content="Direct Home Service Knowledge Base" />
    <meta property="og:image" content="https://docs.directhomeservice.com/brand/logo-09.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Direct Home Service - Knowledge Base" />
    <meta name="twitter:description" content="Official knowledge base for Direct Home Service. Find guides, tutorials, and documentation for the DHS platform." />
    <meta name="twitter:image" content="https://docs.directhomeservice.com/brand/logo-09.png" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Direct Home Service Knowledge Base",
        "url": "https://docs.directhomeservice.com/",
        "description": "Official knowledge base and documentation for the Direct Home Service field service management platform.",
        "publisher": {
            "@type": "Organization",
            "name": "Direct Home Service",
            "url": "https://directhomeservice.com",
            "logo": {
                "@type": "ImageObject",
                "url": "https://docs.directhomeservice.com/brand/logo-09.png"
            },
            "contactPoint": {
                "@type": "ContactPoint",
                "email": "support@directhomeservice.com",
                "contactType": "customer support"
            }
        },
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://docs.directhomeservice.com/?q={search_term_string}",
            "query-input": "required name=search_term_string"
        },
        "inLanguage": ["en-US", "es-US"]
    }
    </script>

    <!-- Structured Data - FAQPage for article listing -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "Direct Home Service Knowledge Base",
        "description": "Browse help articles and documentation for the Direct Home Service platform",
        "url": "https://docs.directhomeservice.com/",
        "mainEntity": {
            "@type": "ItemList",
            "numberOfItems": 16,
            "itemListElement": [
                {"@type": "ListItem", "position": 1, "name": "Users Management", "url": "https://docs.directhomeservice.com/articles/users-management"},
                {"@type": "ListItem", "position": 2, "name": "Crews Management", "url": "https://docs.directhomeservice.com/articles/crews-management"},
                {"@type": "ListItem", "position": 3, "name": "Clients Management", "url": "https://docs.directhomeservice.com/articles/clients-management"},
                {"@type": "ListItem", "position": 4, "name": "Services Management", "url": "https://docs.directhomeservice.com/articles/services-management"},
                {"@type": "ListItem", "position": 5, "name": "Products Management", "url": "https://docs.directhomeservice.com/articles/products-management"},
                {"@type": "ListItem", "position": 6, "name": "Availability Management", "url": "https://docs.directhomeservice.com/articles/availability-management"},
                {"@type": "ListItem", "position": 7, "name": "Appointments Management", "url": "https://docs.directhomeservice.com/articles/appointments-management"},
                {"@type": "ListItem", "position": 8, "name": "Estimates Management", "url": "https://docs.directhomeservice.com/articles/estimates-management"},
                {"@type": "ListItem", "position": 9, "name": "Jobs Management", "url": "https://docs.directhomeservice.com/articles/jobs-management"},
                {"@type": "ListItem", "position": 10, "name": "Invoices Management", "url": "https://docs.directhomeservice.com/articles/invoices-management"},
                {"@type": "ListItem", "position": 11, "name": "Timesheets Management", "url": "https://docs.directhomeservice.com/articles/timesheets-management"},
                {"@type": "ListItem", "position": 12, "name": "Settings & Configuration", "url": "https://docs.directhomeservice.com/articles/settings-configuration"},
                {"@type": "ListItem", "position": 13, "name": "Checklists Management", "url": "https://docs.directhomeservice.com/articles/checklists-management"},
                {"@type": "ListItem", "position": 14, "name": "WhatsApp AI Assistant", "url": "https://docs.directhomeservice.com/articles/whatsapp-ai"},
                {"@type": "ListItem", "position": 15, "name": "AI Assistant (Web & Mobile)", "url": "https://docs.directhomeservice.com/articles/ai-assistant"},
                {"@type": "ListItem", "position": 16, "name": "Appointment Line (IVR)", "url": "https://docs.directhomeservice.com/articles/appointment-line"}
            ]
        }
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/brand/logo-12.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/brand/logo-12.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f5f5f5;
        }
        #root { min-height: 100vh; }
        .app-loading {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
        }
        .app-loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid #e0e0e0; border-top-color: #2E3192;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .app-loading-text { color: #666; margin-top: 16px; font-size: 15px; }
        noscript { display: block; padding: 20px; background-color: #f44336; color: white; text-align: center; }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this application.</noscript>

    <div id="root">
        <div class="app-loading">
            <div class="app-loading-spinner"></div>
            <div class="app-loading-text">Loading Knowledge Base...</div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                var el = document.querySelector('.app-loading');
                if (el && window.React) el.style.display = 'none';
            }, 100);
        });
    </script>

</body>
</html>
